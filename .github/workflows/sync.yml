name: Sync files to subscriber repositories

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ secrets.LEGEND_SWDEV_STANDARDS_SYNC }}
          CONFIG_PATH: .github/sync.yml
          PR_LABELS: standards-sync
          COMMIT_PREFIX: "chore:"
          COMMIT_AS_PR_TITLE: "true"
          PR_BODY: |
            Automated sync from
            [legend-exp/legend-swdev-standards](https://github.com/legend-exp/legend-swdev-standards).

            See the
            [CHANGELOG](https://github.com/legend-exp/legend-swdev-standards/blob/main/CHANGELOG.md)
            for details on what changed.
          OVERWRITE_EXISTING_PR: "true"
